<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Rydo Portal</title>
  {% load static %}
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/portal.css' %}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo"><span class="logo-num">Rydo</span><span class="logo-cabs">CABS</span></div>
    <h2>Driver / Admin Portal</h2>
    <p class="login-sub">Sign in to manage rides and track revenue</p>
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    <p class="login-note">This portal is for authorized drivers and admins only.<br>Customers please visit <a href="/">Rydo.in</a></p>
  </div>
</body>
</html>
